{% extends 'base.html' %}

{% block content %}

<h2>Dashboard</h2>

<div class="row">

    <div class="col-md-3">
        <div class="card bg-primary text-white p-3">
            <h5>Total Members</h5>
            <h3>{{ total_members }}</h3>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-success text-white p-3">
            <h5>Total Plans</h5>
            <h3>{{ total_plans }}</h3>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-warning text-white p-3">
            <h5>Revenue</h5>
            <h3>₹{{ total_revenue }}</h3>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card bg-danger text-white p-3">
            <h5>Attendance</h5>
            <h3>{{ today_attendance }}</h3>
        </div>
    </div>

</div>

{% endblock %}
