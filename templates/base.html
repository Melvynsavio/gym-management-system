<!DOCTYPE html>
<html>
<head>
    <title>Gym Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            display: flex;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #343a40;
            color: white;
            position: fixed;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 15px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #495057;
        }

        .content {
            margin-left: 220px;
            width: 100%;
        }

        .navbar {
            background: #212529;
            color: white;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h4 class="text-center mt-3">🏋️ Gym</h4>

    <a href="/dashboard">Dashboard</a>
    <a href="/members">Members</a>
    <a href="/plans">Plans</a>
    <a href="/attendance">Attendance</a>
    <a href="/payments">Payments</a>
</div>

<!-- MAIN CONTENT -->
<div class="content">

    <!-- NAVBAR -->
    <nav class="navbar p-3">
        <span>Gym Management System</span>
    </nav>

    <!-- PAGE CONTENT -->
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
