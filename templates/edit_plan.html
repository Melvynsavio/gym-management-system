<!DOCTYPE html>
<html>
<head>
    <title>Edit Plan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h2>Edit Plan</h2>

<form action="/update_plan/{{ plan[0] }}" method="POST">

    <input type="text" name="name" value="{{ plan[1] }}" class="form-control mb-2" required>

    <input type="number" name="price" value="{{ plan[2] }}" class="form-control mb-2" required>

    <input type="number" name="duration" value="{{ plan[3] }}" class="form-control mb-2" required>

    <button class="btn btn-success">Update</button>

</form>

</body>
</html>
